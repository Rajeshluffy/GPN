# GPN multi-account credentials (properties-file source)
#
# Used when GPN Account.xlsx is absent or intentionally bypassed.
# Format  : gpn.account.<n>=companyUser,companyPassword,userUser,userPassword
# Sequence: keys are read from gpn.account.1 upward; the first missing key stops the scan.
#
# Example:
# gpn.account.1=sakae,sakae,admin,service701
# gpn.account.2=unozawa,unozawa,admin,admin
#
# To activate: uncomment the lines below and add your accounts.
# Leave this file empty (all lines commented) to fall back to alfaDOCKConfig.properties.
