# Template only — DO NOT fill in real values here or commit a copy that has
# them. Create the real Secret directly with kubectl instead (never checked
# into git):
#
#   kubectl create secret generic gpn-credentials \
#     --from-literal=ALFADOCK_COMPANY_USER=<real value> \
#     --from-literal=ALFADOCK_COMPANY_PASS=<real value> \
#     --from-literal=ALFADOCK_USER_USER=<real value> \
#     --from-literal=ALFADOCK_USER_PASS=<real value> \
#     -n gpn
#
# These 4 keys feed AlfaDockBaseTest's ConfigResolver-based STANDARD-mode
# credential fallback (same names as the Jenkinsfile's Credentials-store
# entries and docker-compose's .env.gpn) — one consistent mechanism across
# Jenkins/Docker/Kubernetes.
#
# The DATAPROVIDER-mode account fixtures ("GPN Account.xlsx" / "GPN Account
# - ERP.xlsx") are binary files, not simple key=value pairs, so they use a
# separate Secret created with --from-file instead of this template:
#
#   kubectl create secret generic gpn-account-data \
#     --from-file="GPN Account.xlsx" \
#     --from-file="GPN Account - ERP.xlsx" \
#     -n gpn
apiVersion: v1
kind: Secret
metadata:
  name: gpn-credentials
  namespace: gpn
type: Opaque
stringData:
  ALFADOCK_COMPANY_USER: "REPLACE_ME"
  ALFADOCK_COMPANY_PASS: "REPLACE_ME"
  ALFADOCK_USER_USER: "REPLACE_ME"
  ALFADOCK_USER_PASS: "REPLACE_ME"
